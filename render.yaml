services:
  - type: web
    name: maigun-backend
    runtime: node
    plan: free
    buildCommand: "cd backend && npm install && npm run db:generate && npm run db:push && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: maigun-postgres
          property: connectionString
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_WEBHOOK_SIGNING_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: API_TOKEN
        sync: false
      - key: WEBHOOK_URL
        value: https://maller-backend-1.onrender.com/api/webhooks
      - key: ELECTRON_ORIGIN
        value: "*" # Allow from any Electron client instance

  - type: pserv
    name: maigun-postgres
    plan: free
    ipAllowList: []
    postgresMajorVersion: 15
